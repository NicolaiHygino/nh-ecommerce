name: API CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
  pull_request:
    paths:
      - 'apps/api/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Build and test
        run: ./gradlew build
